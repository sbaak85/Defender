<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#08130f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>EMBERWATCH — 地城守望</title>
  <meta name="description" content="6×8 縱向俯視棋盤格塔防遊戲" />
  <link rel="manifest" href="manifest.webmanifest?v=20260718-portrait-v1" />
  <link rel="apple-touch-icon" href="assets/processed/icons/player-warrior-icon-45.png" />
  <link rel="preload" as="image" href="assets/source/Cover_Image.png" />
  <link rel="stylesheet" href="styles.css?v=20260722-pause-ui-v36" />
</head>
<body>
  <main id="app" class="app game-blur-target">
    <section id="gameScreen" class="game-screen" aria-label="遊戲場景">
      <header class="hud metal-panel">
        <div class="hud-block timer-block">
          <div class="timer-heading">
            <span id="levelLabel" class="hud-label">剩餘時間</span>
            <strong id="levelProgress" class="level-progress">1 / 5關</strong>
          </div>
          <strong id="timerText" class="timer-text">03:00</strong>
        </div>
        <div class="hud-block score-block" aria-label="總分數">
          <span class="hud-label">總分數</span>
          <strong id="scoreText">0</strong>
        </div>
        <div class="hud-block wave-block">
          <span class="hud-label">威脅</span>
          <div class="threat-track"><i id="threatFill"></i></div>
        </div>
        <div class="hud-block speed-block" aria-label="遊戲速度控制">
          <span class="hud-label">遊戲速度</span>
          <div class="speed-control">
            <button id="speedDownButton" class="icon-button speed-step-button" type="button" aria-label="減速">−</button>
            <strong id="speedDisplay" class="speed-display">×1</strong>
            <button id="speedUpButton" class="icon-button speed-step-button" type="button" aria-label="加速">＋</button>
          </div>
        </div>
        <div class="hud-actions">
          <button id="pauseButton" class="icon-button" type="button" aria-label="暫停">Ⅱ</button>
          <button id="muteButton" class="icon-button" type="button" aria-label="關閉音樂與音效" aria-pressed="true">♪</button>
        </div>
      </header>

      <div class="debug-control hud-debug-control">
        <button id="debugButton" class="debug-button" type="button" aria-expanded="false" aria-controls="debugMenu">Debug</button>
        <div id="debugMenu" class="debug-menu" role="group" aria-label="Debug 功能選單" hidden>
          <div class="debug-option">
            <span class="debug-menu-label">背景音樂</span>
            <button id="bgmToggleButton" class="bgm-toggle is-on" type="button" aria-pressed="true">BGM ON</button>
          </div>
          <div class="debug-option">
            <span class="debug-menu-label">顯示敵方 Collision</span>
            <button id="collisionToggleButton" class="bgm-toggle collision-toggle is-off" type="button" aria-pressed="false">Collision OFF</button>
          </div>
          <div class="debug-option">
            <span class="debug-menu-label">棋盤格框線</span>
            <button id="gridToggleButton" class="bgm-toggle grid-toggle is-off" type="button" aria-pressed="false">Grid OFF</button>
          </div>
          <div class="debug-option">
            <span class="debug-menu-label">特效品質</span>
            <div class="quality-toggle" role="group" aria-label="特效品質切換">
              <button id="qualityStandardButton" class="quality-button" type="button" data-quality="standard" aria-pressed="false">一般</button>
              <button id="qualityMediumButton" class="quality-button" type="button" data-quality="medium" aria-pressed="false">中等</button>
              <button id="qualityHighButton" class="quality-button" type="button" data-quality="high" aria-pressed="false">高</button>
            </div>
          </div>
          <div class="debug-option">
            <span class="debug-menu-label">守軍單位</span>
            <button id="unlockAllUnitsButton" class="bgm-toggle is-off" type="button" aria-pressed="false">全部開放</button>
          </div>
          <div class="debug-option">
            <span class="debug-menu-label">測試金幣</span>
            <button id="debugCoinsButton" class="bgm-toggle is-off" type="button">金幣設為 1,000</button>
          </div>
        </div>
      </div>

      <section class="battlefield-shell">
        <div class="dungeon-crown" aria-hidden="true">
          <span class="torch left"></span><span class="rune">✦</span><span class="torch right"></span>
        </div>
        <div id="board" class="board" aria-label="6乘8戰場棋盤">
          <div id="tileLayer" class="tile-layer hide-grid-lines"></div>
          <div id="rangeLayer" class="range-layer"></div>
          <div id="unitLayer" class="unit-layer"></div>
          <div id="effectLayer" class="effect-layer"></div>
        </div>

        <section id="wall" class="fortress-wall" aria-label="城牆（可選取）" aria-selected="false" tabindex="0">
          <div class="wall-battlement" aria-hidden="true"></div>
          <div class="wall-hp-wrap">
            <span>城牆</span>
            <div class="wall-hp"><i id="wallHpFill"></i></div>
            <strong id="wallHpText">500 / 500</strong>
          </div>
        </section>

        <section class="corridor-shell" aria-label="二樓守軍走廊">
          <div class="corridor-level upper"></div>
          <div id="corridor" class="corridor">
            <div class="corridor-rail" aria-hidden="true"></div>
          </div>
          <div class="corridor-level lower"></div>
        </section>
      </section>

      <div class="battle-action-bar" aria-label="城牆與守軍操作">
        <button id="recycleButton" class="recycle-button" type="button" disabled>回收 50%</button>
        <button id="repairButton" class="repair-button" type="button">
          <span class="repair-icon">⚒</span><span id="repairAmountText">維修 +50</span><small id="repairCostText">10</small>
        </button>
      </div>

      <section class="deck metal-panel" aria-label="可部署單位">
        <div class="deck-title-row">
          <div class="deck-resource-strip" aria-label="金幣資源">
            <div id="deckCoinPile" class="deck-coin-pile" aria-hidden="true"></div>
            <strong id="deckCoinText" class="deck-coin-value">10</strong>
          </div>
          <span id="unlockText" class="deck-status" aria-hidden="true">已開放 6 / 6 格</span>
        </div>
        <div id="unitDeck" class="unit-deck"></div>
        <p class="drag-hint">已部署守軍可拖曳換位；拖到另一名守軍上會直接互換位置</p>
      </section>
    </section>
  </main>

  <button id="fullscreenButton" class="mobile-fullscreen-button" type="button" aria-label="進入全螢幕" aria-pressed="false">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M4 9V4h5M15 4h5v5M20 15v5h-5M9 20H4v-5" />
    </svg>
  </button>

  <section id="orientationGuard" class="orientation-guard" aria-hidden="true">
    <div class="orientation-card">
      <span class="orientation-phone" aria-hidden="true">▯</span>
      <strong>請將手機轉回直式</strong>
      <small>遊戲已暫停，轉回直式後即可繼續</small>
    </div>
  </section>

  <section id="titleScreen" class="title-screen" aria-label="遊戲標題畫面">
    <div class="title-vignette"></div>
    <div class="title-content">
      <button id="continueButton" class="continue-button" type="button" disabled aria-busy="true">Loading 0%</button>
      <div id="preloadStatus" class="preload-status" role="status" aria-live="polite" aria-label="遊戲資源載入進度">
        <div class="preload-status-row">
          <span id="preloadStatusText">正在準備首關資源</span>
          <strong id="preloadPercent">0%</strong>
        </div>
        <span class="preload-track" aria-hidden="true"><i id="preloadProgress"></i></span>
      </div>
      <p class="title-footnote">守住城牆，直到最後一秒</p>
    </div>
  </section>

  <div id="countdownOverlay" class="countdown-overlay" aria-live="assertive"></div>
  <div id="toastLayer" class="toast-layer" aria-live="polite"></div>
  <audio id="bgmAudio" src="assets/audio/幽城深階.mp3" preload="auto" loop></audio>

  <section id="resultOverlay" class="result-overlay" aria-live="assertive">
    <div class="result-card metal-panel">
      <p id="resultKicker">戰線失守</p>
      <h2 id="resultTitle">遊戲失敗</h2>
      <h3 id="resultSubtitle">你的堡壘被攻破了</h3>
      <div class="result-stats">
        <span>擊殺 <b id="resultKills">0</b></span>
        <span>守城 <b id="resultTime">00:00</b></span>
      </div>
      <div id="pauseControls" class="pause-controls" role="group" aria-label="暫停選單設定">
        <div class="pause-control-group">
          <span>音量</span>
          <button id="pauseMuteButton" class="pause-control-button pause-audio-button" type="button" aria-pressed="true">♪ ON</button>
        </div>
        <div class="pause-control-group pause-speed-group">
          <span>速度</span>
          <button id="pauseSpeedDownButton" class="pause-control-button" type="button" aria-label="減速">−</button>
          <strong id="pauseSpeedDisplay">×1</strong>
          <button id="pauseSpeedUpButton" class="pause-control-button" type="button" aria-label="加速">＋</button>
        </div>
      </div>
      <aside id="resultTip" class="result-tip" hidden>
        <strong id="resultTipTitle">守城提示</strong>
        <span id="resultTipText"></span>
      </aside>
      <aside id="pausePerformance" class="pause-performance" hidden>
        <strong>當前表現</strong>
        <span id="pausePerformanceText"></span>
      </aside>
      <button id="restartButton" class="restart-button" type="button">再玩一次</button>
    </div>
  </section>

  <script src="game-config.js?v=20260720-attack-names-v23"></script>
  <script src="game.js?v=20260722-pause-ui-v49"></script>
</body>
</html>
